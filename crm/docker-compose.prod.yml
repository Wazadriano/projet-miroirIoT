version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile.prod
      args:
        VITE_API_URL: ${APP_URL:-https://api-kbeauty.a3n.fr}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-ws-kbeauty.a3n.fr}
        VITE_REVERB_PORT: "443"
        VITE_REVERB_SCHEME: https
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
    restart: unless-stopped
    networks:
      - kbeauty

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.prod
    restart: unless-stopped
    volumes:
      - backend_storage:/var/www/html/storage/app
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: reverb
      REVERB_PORT: "8080"
      REVERB_SCHEME: https
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kbeauty

  reverb:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.prod
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --workers=4
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: "8080"
    depends_on:
      - backend
    networks:
      - kbeauty

  queue:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.prod
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    restart: unless-stopped
    volumes:
      - backend_storage:/var/www/html/storage/app
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - backend
      - redis
    networks:
      - kbeauty

  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.prod
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
    depends_on:
      - backend
    networks:
      - kbeauty

  nginx:
    build:
      context: ./docker/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - reverb
    networks:
      - kbeauty

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kbeauty

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - kbeauty

volumes:
  postgres_data:
  redis_data:
  backend_storage:

networks:
  kbeauty:
    driver: bridge
