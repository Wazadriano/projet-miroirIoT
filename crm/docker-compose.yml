services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: https://api-kbeauty.a3n.fr
      VITE_REVERB_HOST: ws-kbeauty.a3n.fr
      VITE_REVERB_PORT: "443"
      VITE_REVERB_SCHEME: https
      VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kbeauty-frontend.rule=Host(`crm-kbeauty.a3n.fr`)"
      - "traefik.http.routers.kbeauty-frontend.entrypoints=websecure"
      - "traefik.http.routers.kbeauty-frontend.tls=true"
      - "traefik.http.routers.kbeauty-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.kbeauty-frontend.loadbalancer.server.port=3000"
    networks:
      - kbeauty
      - admin_proxy

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.dev # php-fpm (remplace artisan serve)
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage/app
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      APP_URL: https://api-kbeauty.a3n.fr
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QUEUE_CONNECTION: redis
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: reverb
      REVERB_PORT: "8080"
      REVERB_SCHEME: http
      BROADCAST_CONNECTION: reverb
      FRONTEND_URL: https://crm-kbeauty.a3n.fr
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kbeauty
    # Pas de labels Traefik ici — nginx-api expose le backend en HTTP

  nginx-api:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./backend/public:/var/www/html/public:ro
      - backend_storage:/var/www/html/storage/app:ro
      - ./docker/nginx/dev-api.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kbeauty-api.rule=Host(`api-kbeauty.a3n.fr`)"
      - "traefik.http.routers.kbeauty-api.entrypoints=websecure"
      - "traefik.http.routers.kbeauty-api.tls=true"
      - "traefik.http.routers.kbeauty-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.kbeauty-api.loadbalancer.server.port=80"
      - "traefik.http.services.kbeauty-api.loadbalancer.responseForwarding.flushInterval=100ms"
      # CORS géré par Laravel HandleCors — pas de headers Traefik ici
    networks:
      - kbeauty
      - admin_proxy

  reverb:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --debug
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: "8080"
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kbeauty-ws.rule=Host(`ws-kbeauty.a3n.fr`)"
      - "traefik.http.routers.kbeauty-ws.entrypoints=websecure"
      - "traefik.http.routers.kbeauty-ws.tls=true"
      - "traefik.http.routers.kbeauty-ws.tls.certresolver=letsencrypt"
      - "traefik.http.services.kbeauty-ws.loadbalancer.server.port=8080"
    networks:
      - kbeauty
      - admin_proxy

  queue:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage/app
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - backend
      - redis
    networks:
      - kbeauty

  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    command: php artisan schedule:work
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: reverb
      REVERB_PORT: "8080"
      REVERB_SCHEME: http
      BROADCAST_CONNECTION: reverb
    depends_on:
      - backend
      - redis
    networks:
      - kbeauty

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kbeauty

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - kbeauty

  ia-service:
    build: ./ia-service
    restart: unless-stopped
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      MIRROR_SHARED_SECRET: ${MIRROR_SHARED_SECRET}
      IA_MODEL: ${IA_MODEL:-gpt-4o-mini}
      PORT: "3002"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kbeauty-ia.rule=Host(`ia-kbeauty.a3n.fr`)"
      - "traefik.http.routers.kbeauty-ia.entrypoints=websecure"
      - "traefik.http.routers.kbeauty-ia.tls=true"
      - "traefik.http.routers.kbeauty-ia.tls.certresolver=letsencrypt"
      - "traefik.http.services.kbeauty-ia.loadbalancer.server.port=3002"
    networks:
      - kbeauty
      - admin_proxy

volumes:
  postgres_data:
  redis_data:
  backend_storage:

networks:
  kbeauty:
    driver: bridge
  admin_proxy:
    external: true
