upstream backend_fpm {
    server backend:9000;
}

upstream reverb_ws {
    server reverb:8080;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS en production
    # return 301 https://$host$request_uri;

    root /var/www/html/public;
    index index.php;

    # Frontend React (SPA) — proxy vers le conteneur frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API Laravel
    location /api {
        try_files $uri $uri/ /index.php?$query_string;

        fastcgi_pass backend_fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # CORS — géré par Laravel config/cors.php
        # Ne pas dupliquer les headers CORS ici
    }

    # WebSocket Reverb
    location /app {
        proxy_pass http://reverb_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    client_max_body_size 20M;
}
