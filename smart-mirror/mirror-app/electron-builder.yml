appId: com.dreamtech.smartmirror
productName: SmartMirror
directories:
  buildResources: resources
  output: dist
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.*"
  - "!{.eslintignore,.eslintrc.cjs,*.md}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
linux:
  target:
    - target: deb
      arch:
        - arm64
        - x64
    - target: AppImage
      arch:
        - arm64
        - x64
  category: Utility
  maintainer: DreamTech
  desktop:
    Name: SmartMirror
    Comment: Smart Mirror - Analyse capillaire IA
    Type: Application
    Terminal: false
publish:
  provider: generic
  url: "${UPDATE_SERVER_URL}"
