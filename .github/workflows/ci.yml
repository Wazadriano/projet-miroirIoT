name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mirror-app:
    name: Lint, typecheck, tests, build, audit, SBOM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart-mirror/mirror-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: smart-mirror/mirror-app/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (ESLint flat config)
        run: npm run lint

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Build (electron-vite)
        run: npm run build

      # Bloquant : aucune vulnerabilite CRITICAL toleree dans les dependances de
      # production. Passe aujourd'hui (0 critical prod) et echoue si une est introduite.
      - name: Dependency audit - production critical (blocking)
        run: npm audit --omit=dev --audit-level=critical

      # Informatif : vue large (dev incluse). Les advisories Electron high relevent
      # de la veille CVE (upgrade Electron teste, cf. docs/SECURITE-CVE-ET-LANCEMENT.md),
      # pas d'un audit fix automatique.
      - name: Dependency audit - full report (informative)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: SBOM (CycloneDX - exigence CRA)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.json
        continue-on-error: true

      - name: Upload coverage + SBOM
        uses: actions/upload-artifact@v4
        with:
          name: mirror-app-reports
          path: |
            smart-mirror/mirror-app/coverage
            smart-mirror/mirror-app/sbom.json
          if-no-files-found: ignore

  secrets-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Bloquant : aucun secret dans l'arbre courant. --no-git evite de buter sur le
      # token CRM historiquement leake puis revoque (cf. smart-mirror/.env.example).
      - name: gitleaks (working tree)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect \
            --source /repo --no-git --redact --no-banner

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config p/default --config p/secrets --config p/typescript --error
        continue-on-error: true
